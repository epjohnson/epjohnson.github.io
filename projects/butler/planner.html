  for (const c of DATA.financeRequired) if (c.defaultPriority) s.prefs[c.id] = { ...(s.prefs[c.id]||{}), priority: c.defaultPriority };
  for (const f of DATA.faculty) if (f.defaultPriority) s.prefs[f.id] = { ...(s.prefs[f.id]||{}), priority: f.defaultPriority };
  for (const e of DATA.experiential) if (e.defaultPriority) s.prefs[e.id] = { ...(s.prefs[e.id]||{}), priority: e.defaultPriority };
  return s;
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const d = defaultState();
    return { ...d, ...parsed, prefs: { ...d.prefs, ...(parsed.prefs||{}) }, plan: { ...d.plan, ...(parsed.plan||{}) }, questions: { ...d.questions, ...(parsed.questions||{}) } };
  } catch(e) { return defaultState(); }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  document.getElementById("last-saved").textContent = new Date().toLocaleString();
}
function getPref(id) { return state.prefs[id] || {}; }
function setPref(id, patch) { state.prefs[id] = { ...getPref(id), ...patch }; saveState(); }

function exportState() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `butler-finance-planner-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importState(evt) {
  const f = evt.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const d = defaultState();
      state = { ...d, ...parsed, prefs: { ...d.prefs, ...(parsed.prefs||{}) }, plan: { ...d.plan, ...(parsed.plan||{}) }, questions: { ...d.questions, ...(parsed.questions||{}) } };
      saveState(); render();
      alert("Imported successfully.");
    } catch(e) { alert("Import failed: " + e.message); }
  };
  reader.readAsText(f);
}
function resetState() {
  if (!confirm("Reset all saved preferences, semester plan, and notes?")) return;
  state = defaultState();
  saveState(); render();
}

function chipStatus(v) {

// ---- SEMESTER PLANNER ----
function renderPlanner() {
  const coursesAll = [...DATA.businessCore, ...DATA.financeRequired, ...DATA.financeElectives, ...DATA.universityCore];
  const plannedIds = new Set(Object.values(state.plan).flat());

  const cards = SEMESTERS.map(sem => {
    const ids = state.plan[sem] || [];
    const credits = ids.reduce((a, id) => a + (findCourse(id)?.credits || 0), 0);
    const credStyle = credits < 12 ? "text-amber-600" : credits > 18 ? "text-red-600" : "text-emerald-700";
    const avail = coursesAll.filter(c => !plannedIds.has(c.id) || ids.includes(c.id));
    return `
      <div class="bg-white border rounded-lg p-3 sem-card flex flex-col">
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-sm">${sem}</h3>
          <span class="text-xs font-bold ${credStyle}">${credits} cr</span>
        </div>
        <ul class="flex-1 space-y-1 mb-2">
          ${ids.map(id => {
            const c = findCourse(id);
            if (!c) return "";
            return `<li class="flex items-center justify-between text-xs bg-slate-50 rounded px-2 py-1">
              <span><b>${c.code}</b> · ${c.name} <span class="muted">(${c.credits}cr)</span></span>
              <button title="Remove" class="text-red-500 hover:text-red-700 font-bold" onclick="removeFromSemester('${sem}','${id}')">×</button>
            </li>`;
          }).join("") || `<li class="text-xs text-slate-400 italic">No courses yet</li>`}
        </ul>
        <select class="text-xs border rounded px-2 py-1 bg-yellow-50" onchange="addToSemester('${sem}', this.value); this.value=''">
          <option value="">+ Add course…</option>
          ${avail.filter(c => !ids.includes(c.id)).map(c => `<option value="${c.id}">${c.code} — ${c.name} (${c.credits}cr)</option>`).join("")}
        </select>
      </div>
    `;
  }).join("");

  const totalCreds = SEMESTERS.reduce((a, s) => a + (state.plan[s]||[]).reduce((x,id) => x + (findCourse(id)?.credits||0), 0), 0);
  const target = 122;

  return `
    <section class="bg-white rounded-lg border p-4 mb-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold">Semester Planner</h2>
        <div class="text-sm"><span class="text-slate-500">Total credits planned:</span> <b class="${totalCreds >= target ? 'text-emerald-700' : 'text-amber-600'}">${totalCreds}</b> <span class="text-slate-400">/ ${target}</span></div>
      </div>
      <p class="text-xs text-slate-600 mt-1">Target: ~15 credits per semester. Yellow dropdown adds a course. ×&nbsp;removes it. Courses on the list of planned courses disappear from other semesters' dropdowns to avoid duplicates.</p>
    </section>
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">${cards}</div>
  `;
}
function addToSemester(sem, id) { if (!id) return; state.plan[sem] = state.plan[sem] || []; if (!state.plan[sem].includes(id)) state.plan[sem].push(id); saveState(); render(); }
function removeFromSemester(sem, id) { state.plan[sem] = (state.plan[sem]||[]).filter(x => x !== id); saveState(); render(); }

      <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-100">
          <tr>
            <th class="text-left px-2 py-2 w-64">Option</th>
            <th class="text-center px-2 py-2">Teaching<br/>quality</th>
            <th class="text-center px-2 py-2">Content<br/>value</th>
            <th class="text-center px-2 py-2">Career<br/>relevance</th>
            <th class="text-center px-2 py-2">Mentor /<br/>network</th>
            <th class="text-center px-2 py-2">Schedule<br/>fit</th>
            <th class="text-center px-2 py-2">Total</th>
            <th class="text-left px-2 py-2 min-w-[200px]">Notes</th>
            <th class="w-8"></th>
          </tr>
        </thead>
        <tbody>
          ${rows.length === 0 ? `<tr><td colspan="9" class="text-center text-slate-400 italic py-6">No options yet — click "+ Add option" to compare.</td></tr>` :
            rows.map((r, i) => {
              const tot = ["teaching","content","career","mentor","schedule"].reduce((a,k) => a + (Number(r.scores[k])||0), 0);
              const totCls = tot >= 20 ? "bg-emerald-100 text-emerald-900" : tot >= 12 ? "bg-yellow-100 text-yellow-900" : "bg-red-100 text-red-900";
              return `<tr class="border-b align-middle">
                <td class="px-2 py-1"><input type="text" value="${(r.label||"").replace(/"/g,'&quot;')}" class="w-full border rounded px-2 py-1 text-sm bg-yellow-50" oninput="state.decisionMatrix[${i}].label=this.value; saveState()" /></td>
                ${["teaching","content","career","mentor","schedule"].map(k =>
                  `<td class="px-2 py-1 text-center"><select class="border rounded px-1 py-1 text-sm bg-yellow-50" onchange="state.decisionMatrix[${i}].scores['${k}']=Number(this.value); render()">
                    <option value="">—</option>
                    ${[1,2,3,4,5].map(n => `<option value="${n}" ${r.scores[k]===n?'selected':''}>${n}</option>`).join("")}
                  </select></td>`).join("")}
                <td class="px-2 py-1 text-center font-bold ${totCls}">${tot || "—"}</td>
                <td class="px-2 py-1"><input type="text" value="${(r.notes||"").replace(/"/g,'&quot;')}" class="w-full border rounded px-2 py-1 text-sm bg-yellow-50" oninput="state.decisionMatrix[${i}].notes=this.value; saveState()" /></td>
                <td class="px-2 py-1 text-center"><button class="text-red-500 hover:text-red-700 font-bold" onclick="removeDecisionRow(${i})">×</button></td>
              </tr>`;
            }).join("")}
        </tbody>
      </table>
      </div>
    </section>
  `;
}
function addDecisionRow() { state.decisionMatrix = state.decisionMatrix || []; state.decisionMatrix.push({ label:"", scores:{teaching:0,content:0,career:0,mentor:0,schedule:0}, notes:"" }); saveState(); render(); }
function removeDecisionRow(i) { state.decisionMatrix.splice(i,1); saveState(); render(); }

// ---- OPEN QUESTIONS ----
function renderQuestions() {
  return `
    <section class="bg-white rounded-lg border p-4 mb-6">
      <h2 class="text-lg font-bold mb-3">Open Questions</h2>
      <p class="text-xs text-slate-600 mb-3">Research items from the brief. Status: open / in-progress / resolved. Put answers in "Findings."</p>
      <ul class="divide-y">
        ${DATA.openQuestions.map((q, i) => {
          const qs = state.questions[q.id] || {};
          const statusCls = qs.status === "resolved" ? "bg-emerald-100 text-emerald-900" : qs.status === "inprogress" ? "bg-yellow-100 text-yellow-900" : "bg-slate-100 text-slate-700";
          return `<li class="py-3">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1">
                <div class="font-medium text-sm">${i+1}. ${q.text}</div>
                <div class="text-xs text-slate-500">Who to ask: ${q.who}</div>
              </div>
              <select class="text-xs rounded px-2 py-1 ${statusCls}" onchange="state.questions['${q.id}']={...(state.questions['${q.id}']||{}), status:this.value}; saveState(); render()">
                <option value="open" ${qs.status==='open'||!qs.status?'selected':''}>Open</option>
                <option value="inprogress" ${qs.status==='inprogress'?'selected':''}>In progress</option>
                <option value="resolved" ${qs.status==='resolved'?'selected':''}>Resolved</option>
              </select>
            </div>
            <textarea rows="2" class="text-xs border rounded px-2 py-1 w-full mt-2 bg-yellow-50" placeholder="Findings / answer / link…" onchange="state.questions['${q.id}']={...(state.questions['${q.id}']||{}), findings:this.value}; saveState()">${(qs.findings||"").replace(/</g,"&lt;")}</textarea>
          </li>`;
        }).join("")}
      </ul>
    </section>
  `;
}

// ---- MAIN RENDER ----
function render() {
  const root = document.getElementById("main");
  let html = "";
  switch (currentTab) {
    case "dashboard": html = renderDashboard(); break;
    case "core": html = renderCourseTable("Business Core (required for all Lacy majors)", DATA.businessCore, "core"); break;
    case "required": html = renderCourseTable("Finance Required", DATA.financeRequired, "required"); break;
    case "electives": html = renderElectives(); break;
    case "univcore":
      html = renderCourseTable("University Core (Gen-Eds + Honors)",
        DATA.universityCore.map(r => ({ ...r, year:"—", prereqs:"—", professors:r.area })), "univ");
      break;
    case "faculty": html = renderFaculty(); break;
    case "experiential": html = renderExperiential(); break;
    case "planner": html = renderPlanner(); break;
    case "decision": html = renderDecision(); break;
    case "questions": html = renderQuestions(); break;
  }
  root.innerHTML = html;
}

// boot
showTab("dashboard");
document.getElementById("last-saved").textContent = localStorage.getItem(STORAGE_KEY) ? "already saved" : "not yet";
</script>
</body>
</html>
